<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PresentPo - Face Recognition Attendance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 1600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        h1 .logo {
            font-size: 48px;
        }

        .status {
            text-align: center;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-weight: 500;
        }

        .status.loading {
            background: #fff3cd;
            color: #856404;
        }

        .status.ready {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 20px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .main-content.fullscreen-camera {
            grid-template-columns: 1fr 0.3fr;
            grid-template-rows: auto;
        }

        .main-content.fullscreen-camera .camera-section {
            grid-column: 1;
        }

        .main-content.fullscreen-camera .add-section {
            display: none;
        }

        .main-content.fullscreen-camera .detection-section,
        .main-content.fullscreen-camera .attendance-section {
            display: block;
        }

        .main-content.fullscreen-camera .controls-row {
            grid-column: 2;
            grid-template-columns: 1fr;
            grid-template-rows: auto auto;
        }

        .main-content.fullscreen-camera .detection-section {
            grid-column: 2;
            grid-row: 1;
        }

        .main-content.fullscreen-camera .attendance-section {
            grid-column: 2;
            grid-row: 2;
        }

        .section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
        }

        .section h2 {
            color: #495057;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }

        #videoElement {
            width: 100%;
            display: block;
        }

        #overlayCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .training-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            color: #495057;
            font-size: 14px;
        }

        input[type="text"] {
            padding: 10px;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        input[type="file"] {
            padding: 8px;
            border: 2px dashed #dee2e6;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-small {
            padding: 4px 8px;
            font-size: 11px;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .known-faces-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
            max-height: 500px;
            overflow-y: auto;
        }

        .person-card {
            background: white;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #dee2e6;
        }

        .person-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .person-name {
            font-weight: 700;
            color: #495057;
            font-size: 16px;
        }

        .photo-count {
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .person-photos {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .photo-thumbnail {
            position: relative;
            width: 50px;
            height: 50px;
        }

        .photo-thumbnail img {
            width: 100%;
            height: 100%;
            border-radius: 6px;
            object-fit: cover;
            border: 2px solid #dee2e6;
        }

        .photo-thumbnail .remove-photo {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .person-actions {
            display: flex;
            gap: 6px;
        }

        .detection-log {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 500px;
            overflow-y: auto;
        }

        .detection-entry {
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid;
            background: white;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .detection-entry.recognized {
            border-color: #28a745;
        }

        .detection-entry.unknown {
            border-color: #dc3545;
        }

        .detection-entry .name {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .detection-entry.recognized .name {
            color: #28a745;
        }

        .detection-entry.unknown .name {
            color: #dc3545;
        }

        .detection-entry .details {
            font-size: 12px;
            color: #6c757d;
        }

        .daily-log {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 500px;
            overflow-y: auto;
        }

        .daily-entry {
            background: white;
            padding: 14px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            animation: slideIn 0.3s ease-out;
        }

        .daily-entry .person-name {
            font-weight: 700;
            font-size: 16px;
            color: #495057;
            margin-bottom: 6px;
        }

        .daily-entry .first-seen {
            font-size: 13px;
            color: #28a745;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .daily-entry .date {
            font-size: 11px;
            color: #6c757d;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .threshold-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            padding: 10px;
            background: white;
            border-radius: 8px;
        }

        .threshold-control input[type="range"] {
            flex: 1;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #6c757d;
        }

        .date-header {
            background: #667eea;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 10px;
            text-align: center;
        }

        .controls-row {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 1200px) {
            .main-content {
                grid-template-columns: 1fr 1fr;
            }
            
            .controls-row {
                grid-column: 1 / -1;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .controls-row {
                grid-column: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span class="logo">📸</span>
            <span>PresentPo</span>
        </h1>
        <div id="status" class="status loading">Loading models...</div>

        <div class="main-content" id="mainContent">
            <div class="section camera-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h2 style="margin: 0;">📹 Live Camera Feed</h2>
                    <button class="btn-secondary btn-small" onclick="toggleCameraSize()">
                        <span id="cameraSizeToggle">Fullscreen</span>
                    </button>
                </div>
                <div class="video-container">
                    <video id="videoElement" autoplay playsinline></video>
                    <canvas id="overlayCanvas"></canvas>
                </div>
                
                <div class="threshold-control">
                    <label>Recognition Threshold:</label>
                    <input type="range" id="threshold" min="0.3" max="0.7" step="0.05" value="0.50">
                    <span id="thresholdValue">0.50</span>
                </div>

                <div class="controls">
                    <button class="btn-primary" id="startBtn" onclick="startCamera()">Start Camera</button>
                    <button class="btn-danger" id="stopBtn" onclick="stopCamera()" disabled>Stop Camera</button>
                </div>
            </div>

            <div class="section detection-section">
                <h2>👤 Live Detections</h2>
                <div style="text-align: right; margin-bottom: 10px;">
                    <button class="btn-danger btn-small" onclick="clearLiveDetections()">Clear</button>
                </div>
                <div id="detectionLog" class="detection-log">
                    <div class="empty-state">Waiting for detections...</div>
                </div>
            </div>

            <div class="section attendance-section">
                <h2>📅 Daily Attendance</h2>
                <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                    <button class="btn-secondary btn-small" onclick="previousDay()">← Prev</button>
                    <button class="btn-primary btn-small" onclick="goToToday()">Today</button>
                    <button class="btn-secondary btn-small" onclick="nextDay()">Next →</button>
                    <button class="btn-danger btn-small" onclick="clearCurrentDayLog()" style="margin-left: auto;">Clear</button>
                </div>
                <div class="date-header" id="currentDate"></div>
                <div style="text-align: center; margin-bottom: 10px;">
                    <span style="font-size: 12px; color: #6c757d;">Total: <strong id="attendanceCount">0</strong> people</span>
                </div>
                <div id="dailyLog" class="daily-log">
                    <div class="empty-state">No one detected this day</div>
                </div>
            </div>

            <div class="controls-row add-section">
                <div class="section" style="grid-column: 1 / -1;">
                    <h2>➕ Add Known Face</h2>
                    <div class="training-area">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div class="input-group">
                                <label>Person's Name:</label>
                                <input type="text" id="personName" placeholder="Enter name...">
                            </div>
                            
                            <div class="input-group">
                                <label>Upload Photo(s):</label>
                                <input type="file" id="photoUpload" accept="image/*" multiple>
                            </div>
                        </div>
                        
                        <div style="display: flex; gap: 10px;">
                            <button class="btn-primary" onclick="addKnownFace()">Add Photo(s)</button>
                            <button class="btn-secondary" onclick="captureFromCamera()">Capture from Camera</button>
                        </div>
                    </div>

                    <h3 style="margin-top: 20px; color: #495057; font-size: 16px;">Known People (<span id="peopleCount">0</span>):</h3>
                    <div id="knownFacesList" class="known-faces-list">
                        <div class="empty-state">No people added yet</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- face-api.js library -->
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    
    <script>
        let videoElement, overlayCanvas, overlayCtx;
        let isModelLoaded = false;
        let stream = null;
        let knownPeople = {}; // { name: { descriptors: [], images: [] } }
        let detectionInterval = null;
        let recognitionThreshold = 0.50;
        let lastDetections = {};
        let attendanceHistory = {}; // { 'YYYY-MM-DD': { name: timestamp } }
        let currentViewDate = new Date(); // Currently viewing date
        let isCameraExpanded = false;

        // Initialize when page loads
        window.addEventListener('load', async () => {
            videoElement = document.getElementById('videoElement');
            overlayCanvas = document.getElementById('overlayCanvas');
            overlayCtx = overlayCanvas.getContext('2d');

            // Load face-api models
            await loadModels();

            // Setup threshold slider
            document.getElementById('threshold').addEventListener('input', (e) => {
                recognitionThreshold = parseFloat(e.target.value);
                document.getElementById('thresholdValue').textContent = recognitionThreshold.toFixed(2);
            });

            // Load saved data from localStorage
            loadSavedData();

            // Update current date display
            updateDateDisplay();

            // Initialize today's attendance if needed
            initializeTodayAttendance();
        });

        function getDateKey(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function getTodayKey() {
            return getDateKey(new Date());
        }

        function updateDateDisplay() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dateStr = currentViewDate.toLocaleDateString('en-US', options);
            
            const today = getTodayKey();
            const viewing = getDateKey(currentViewDate);
            const isToday = today === viewing;
            
            document.getElementById('currentDate').textContent = dateStr + (isToday ? ' (Today)' : '');
            updateDailyLogDisplay();
        }

        function initializeTodayAttendance() {
            const todayKey = getTodayKey();
            if (!attendanceHistory[todayKey]) {
                attendanceHistory[todayKey] = {};
                saveAttendanceHistory();
            }
        }

        function previousDay() {
            currentViewDate.setDate(currentViewDate.getDate() - 1);
            updateDateDisplay();
        }

        function nextDay() {
            const tomorrow = new Date(currentViewDate);
            tomorrow.setDate(tomorrow.getDate() + 1);
            
            // Don't go beyond today
            if (getDateKey(tomorrow) <= getTodayKey()) {
                currentViewDate = tomorrow;
                updateDateDisplay();
            }
        }

        function goToToday() {
            currentViewDate = new Date();
            updateDateDisplay();
        }

        function toggleCameraSize() {
            const mainContent = document.getElementById('mainContent');
            const toggleBtn = document.getElementById('cameraSizeToggle');
            
            isCameraExpanded = !isCameraExpanded;
            
            if (isCameraExpanded) {
                mainContent.classList.add('fullscreen-camera');
                toggleBtn.textContent = 'Exit Fullscreen';
            } else {
                mainContent.classList.remove('fullscreen-camera');
                toggleBtn.textContent = 'Fullscreen';
            }
        }

        function clearLiveDetections() {
            const container = document.getElementById('detectionLog');
            container.innerHTML = '<div class="empty-state">Waiting for detections...</div>';
            lastDetections = {};
            updateStatus('Live detections cleared', 'ready');
        }

        function clearCurrentDayLog() {
            const dateKey = getDateKey(currentViewDate);
            const today = getTodayKey();
            const isToday = dateKey === today;
            
            const confirmMsg = isToday 
                ? "Clear today's attendance? This will remove all records for today."
                : `Clear attendance for ${currentViewDate.toLocaleDateString()}? This cannot be undone.`;
            
            if (confirm(confirmMsg)) {
                attendanceHistory[dateKey] = {};
                saveAttendanceHistory();
                updateDailyLogDisplay();
                updateStatus(`Attendance cleared for ${currentViewDate.toLocaleDateString()}`, 'ready');
            }
        }

        function loadSavedData() {
            // Load known people
            const savedPeople = localStorage.getItem('knownPeople');
            if (savedPeople) {
                knownPeople = JSON.parse(savedPeople);
                updateKnownFacesList();
            }

            // Load attendance history
            const savedHistory = localStorage.getItem('attendanceHistory');
            if (savedHistory) {
                attendanceHistory = JSON.parse(savedHistory);
                updateDailyLogDisplay();
            }
        }

        function saveKnownPeople() {
            localStorage.setItem('knownPeople', JSON.stringify(knownPeople));
        }

        function saveAttendanceHistory() {
            localStorage.setItem('attendanceHistory', JSON.stringify(attendanceHistory));
        }

        async function loadModels() {
            try {
                updateStatus('Loading AI models...', 'loading');
                
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/model';
                
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);

                isModelLoaded = true;
                updateStatus('✓ Models loaded! Click "Start Camera" to begin.', 'ready');
            } catch (error) {
                console.error('Error loading models:', error);
                updateStatus('✗ Error loading models: ' + error.message, 'error');
            }
        }

        async function startCamera() {
            if (!isModelLoaded) {
                alert('Models are still loading. Please wait.');
                return;
            }

            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: 640, height: 480 } 
                });
                videoElement.srcObject = stream;

                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;

                videoElement.onloadedmetadata = () => {
                    overlayCanvas.width = videoElement.videoWidth;
                    overlayCanvas.height = videoElement.videoHeight;
                    startDetection();
                };

                updateStatus('✓ Camera active - Detecting faces...', 'ready');
            } catch (error) {
                console.error('Error accessing camera:', error);
                let errorMessage = 'Camera access denied. Please allow camera permissions.';
                if (error.name === 'NotFoundError') {
                    errorMessage = 'No camera found. Please connect a camera.';
                } else if (error.name === 'NotAllowedError') {
                    errorMessage = 'Camera permission denied. Please allow camera access in your browser settings.';
                }
                updateStatus('✗ ' + errorMessage, 'error');
                alert(errorMessage);
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                videoElement.srcObject = null;
            }

            if (detectionInterval) {
                clearInterval(detectionInterval);
            }

            overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            updateStatus('Camera stopped', 'ready');
        }

        async function startDetection() {
            detectionInterval = setInterval(async () => {
                if (videoElement.readyState === 4) {
                    await detectFaces();
                }
            }, 100);
        }

        async function detectFaces() {
            try {
                const detections = await faceapi
                    .detectAllFaces(videoElement, new faceapi.TinyFaceDetectorOptions())
                    .withFaceLandmarks()
                    .withFaceDescriptors();

                overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

                if (detections.length > 0) {
                    const currentDetections = {};

                    detections.forEach((detection, index) => {
                        const box = detection.detection.box;
                        const descriptor = detection.descriptor;

                        let label = 'Unknown';
                        let color = '#dc3545';
                        let minDistance = Infinity;

                        // Compare with all descriptors of all known people
                        for (const [name, personData] of Object.entries(knownPeople)) {
                            for (const knownDescriptor of personData.descriptors) {
                                const distance = faceapi.euclideanDistance(descriptor, knownDescriptor);
                                
                                if (distance < minDistance) {
                                    minDistance = distance;
                                }
                            }
                        }

                        // Find best match
                        for (const [name, personData] of Object.entries(knownPeople)) {
                            for (const knownDescriptor of personData.descriptors) {
                                const distance = faceapi.euclideanDistance(descriptor, knownDescriptor);
                                
                                if (distance === minDistance && distance < recognitionThreshold) {
                                    label = name;
                                    color = '#28a745';
                                    break;
                                }
                            }
                            if (label !== 'Unknown') break;
                        }

                        // Draw bounding box
                        overlayCtx.strokeStyle = color;
                        overlayCtx.lineWidth = 3;
                        overlayCtx.strokeRect(box.x, box.y, box.width, box.height);

                        // Draw label
                        const text = `${label} (${minDistance.toFixed(3)})`;
                        overlayCtx.font = 'bold 16px Arial';
                        const textWidth = overlayCtx.measureText(text).width;
                        overlayCtx.fillStyle = color;
                        overlayCtx.fillRect(box.x, box.y - 30, textWidth + 20, 30);
                        overlayCtx.fillStyle = 'white';
                        overlayCtx.fillText(text, box.x + 10, box.y - 8);

                        // Track detection
                        currentDetections[label] = {
                            distance: minDistance,
                            timestamp: Date.now()
                        };
                    });

                    updateDetectionLog(currentDetections);
                }
            } catch (error) {
                console.error('Detection error:', error);
            }
        }

        function updateDetectionLog(currentDetections) {
            const todayKey = getTodayKey();
            
            for (const [name, data] of Object.entries(currentDetections)) {
                // Update live detection log (only if not seen in last 2 seconds)
                if (!lastDetections[name] || (Date.now() - lastDetections[name]) > 2000) {
                    addDetectionEntry(name, data.distance);
                    lastDetections[name] = Date.now();
                }

                // Update today's attendance (only once per day, only for recognized faces)
                if (name !== 'Unknown') {
                    if (!attendanceHistory[todayKey]) {
                        attendanceHistory[todayKey] = {};
                    }
                    
                    if (!attendanceHistory[todayKey][name]) {
                        const now = new Date();
                        attendanceHistory[todayKey][name] = now.getTime();
                        saveAttendanceHistory();
                        
                        // Only update display if we're viewing today
                        if (getDateKey(currentViewDate) === todayKey) {
                            updateDailyLogDisplay();
                        }
                    }
                }
            }
        }

        function addDetectionEntry(name, distance) {
            const logContainer = document.getElementById('detectionLog');
            
            const emptyState = logContainer.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            const isRecognized = name !== 'Unknown';
            const entry = document.createElement('div');
            entry.className = `detection-entry ${isRecognized ? 'recognized' : 'unknown'}`;
            
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `
                <div class="name">${isRecognized ? '✓ ' : '✗ '}${name}</div>
                <div class="details">Distance: ${distance.toFixed(3)} | Time: ${time}</div>
            `;
            
            logContainer.insertBefore(entry, logContainer.firstChild);

            while (logContainer.children.length > 20) {
                logContainer.removeChild(logContainer.lastChild);
            }
        }

        function updateDailyLogDisplay() {
            const container = document.getElementById('dailyLog');
            const dateKey = getDateKey(currentViewDate);
            const dayData = attendanceHistory[dateKey] || {};
            
            container.innerHTML = '';

            const count = Object.keys(dayData).length;
            document.getElementById('attendanceCount').textContent = count;

            if (count === 0) {
                container.innerHTML = '<div class="empty-state">No one detected this day</div>';
                return;
            }

            // Sort by earliest time
            const sorted = Object.entries(dayData).sort((a, b) => a[1] - b[1]);

            sorted.forEach(([name, timestamp]) => {
                const entry = document.createElement('div');
                entry.className = 'daily-entry';
                
                const date = new Date(timestamp);
                const timeStr = date.toLocaleTimeString();
                const dateStr = date.toLocaleDateString();
                
                entry.innerHTML = `
                    <div class="person-name">👤 ${name}</div>
                    <div class="first-seen">First seen: ${timeStr}</div>
                    <div class="date">${dateStr}</div>
                `;
                
                container.appendChild(entry);
            });
        }

        async function addKnownFace() {
            const name = document.getElementById('personName').value.trim();
            const fileInput = document.getElementById('photoUpload');

            if (!name) {
                alert('Please enter a name');
                return;
            }

            if (!fileInput.files || fileInput.files.length === 0) {
                alert('Please select at least one photo');
                return;
            }

            try {
                updateStatus('Processing image(s)...', 'loading');
                
                // Initialize person if doesn't exist
                if (!knownPeople[name]) {
                    knownPeople[name] = { descriptors: [], images: [] };
                }

                let successCount = 0;
                
                for (const file of fileInput.files) {
                    const img = await loadImage(file);

                    const detection = await faceapi
                        .detectSingleFace(img, new faceapi.TinyFaceDetectorOptions())
                        .withFaceLandmarks()
                        .withFaceDescriptor();

                    if (detection) {
                        knownPeople[name].descriptors.push(Array.from(detection.descriptor));
                        knownPeople[name].images.push(img.src);
                        successCount++;
                    }
                }

                if (successCount === 0) {
                    alert('No faces detected in any of the images. Please use clear photos with visible faces.');
                    return;
                }

                saveKnownPeople();
                updateKnownFacesList();

                document.getElementById('personName').value = '';
                document.getElementById('photoUpload').value = '';

                updateStatus(`✓ Added ${successCount} photo(s) for ${name}`, 'ready');
            } catch (error) {
                console.error('Error adding face:', error);
                updateStatus('Error adding face: ' + error.message, 'error');
            }
        }

        async function captureFromCamera() {
            const name = document.getElementById('personName').value.trim();

            if (!name) {
                alert('Please enter a name first');
                return;
            }

            if (!stream) {
                alert('Please start the camera first');
                return;
            }

            try {
                updateStatus('Capturing from camera...', 'loading');

                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = videoElement.videoWidth;
                tempCanvas.height = videoElement.videoHeight;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.drawImage(videoElement, 0, 0);

                const detection = await faceapi
                    .detectSingleFace(tempCanvas, new faceapi.TinyFaceDetectorOptions())
                    .withFaceLandmarks()
                    .withFaceDescriptor();

                if (!detection) {
                    updateStatus('No face detected in camera', 'error');
                    alert('No face detected in camera. Please position your face clearly and try again.');
                    return;
                }

                if (!knownPeople[name]) {
                    knownPeople[name] = { descriptors: [], images: [] };
                }

                knownPeople[name].descriptors.push(Array.from(detection.descriptor));
                knownPeople[name].images.push(tempCanvas.toDataURL());
                
                saveKnownPeople();
                updateKnownFacesList();

                document.getElementById('personName').value = '';
                updateStatus(`✓ Captured and added photo for ${name}`, 'ready');
            } catch (error) {
                console.error('Error capturing from camera:', error);
                updateStatus('Error: ' + error.message, 'error');
            }
        }

        function updateKnownFacesList() {
            const container = document.getElementById('knownFacesList');
            container.innerHTML = '';

            const count = Object.keys(knownPeople).length;
            document.getElementById('peopleCount').textContent = count;

            if (count === 0) {
                container.innerHTML = '<div class="empty-state">No people added yet</div>';
                return;
            }

            for (const [name, personData] of Object.entries(knownPeople)) {
                const card = document.createElement('div');
                card.className = 'person-card';
                
                const photosHTML = personData.images.map((imgSrc, index) => `
                    <div class="photo-thumbnail">
                        <img src="${imgSrc}" alt="${name}">
                        <button class="remove-photo" onclick="removePhoto('${name}', ${index})">×</button>
                    </div>
                `).join('');

                card.innerHTML = `
                    <div class="person-header">
                        <span class="person-name">${name}</span>
                        <span class="photo-count">${personData.images.length} photo${personData.images.length !== 1 ? 's' : ''}</span>
                    </div>
                    <div class="person-photos">
                        ${photosHTML}
                    </div>
                    <div class="person-actions">
                        <button class="btn-danger btn-small" onclick="removePerson('${name}')">Remove Person</button>
                    </div>
                `;
                
                container.appendChild(card);
            }
        }

        function removePhoto(name, index) {
            if (knownPeople[name]) {
                knownPeople[name].descriptors.splice(index, 1);
                knownPeople[name].images.splice(index, 1);

                // If no photos left, remove the person entirely
                if (knownPeople[name].images.length === 0) {
                    delete knownPeople[name];
                }

                saveKnownPeople();
                updateKnownFacesList();
                updateStatus(`Photo removed`, 'ready');
            }
        }

        function removePerson(name) {
            if (confirm(`Are you sure you want to remove ${name} and all their photos?`)) {
                delete knownPeople[name];
                saveKnownPeople();
                updateKnownFacesList();
                updateStatus(`Removed ${name}`, 'ready');
            }
        }

        function loadImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function updateStatus(message, type) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
        }
    </script>
</body>
</html>
